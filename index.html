<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twst Goods Manager - クラウド同期版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app" class="twst-theme">
        <!-- ログインセクション -->
        <div id="auth-section" class="auth-overlay">
            <div class="glass-panel main-auth-panel">
                <h3>鏡の向こうへ（ログイン）</h3>
                <p>データを同期するため、サインインしてください。</p>
                <form id="auth-form">
                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" id="auth-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>パスワード</label>
                        <input type="password" id="auth-password" placeholder="••••••••" required>
                    </div>
                    <div class="modal-actions">
                        <button type="submit" id="signin-btn" class="primary-btn">ログイン</button>
                        <button type="button" id="signup-btn" class="nav-btn">新規登録</button>
                    </div>
                    <div class="auth-footer" style="margin-top: 1rem; text-align: center;">
                        <button type="button" class="nav-btn mini" onclick="handlePasswordReset()">パスワードを忘れた</button>
                    </div>
                </form>
                <div id="auth-message" class="auth-message"></div>
            </div>
        </div>

        <!-- パスワード再設定セクション (リカバリ時に表示) -->
        <div id="update-password-section" class="auth-overlay hidden">
            <div class="glass-panel main-auth-panel">
                <h3>新しい合言葉を刻む（再設定）</h3>
                <p>新しいパスワードを入力してください。</p>
                <form id="update-password-form" onsubmit="handlePasswordUpdate(event)">
                    <div class="form-group">
                        <label>新しいパスワード</label>
                        <input type="password" id="new-password" placeholder="••••••••" required>
                    </div>
                    <div class="modal-actions">
                        <button type="submit" class="confirm-btn">合言葉を更新する</button>
                    </div>
                </form>
                <div id="update-message" class="auth-message"></div>
            </div>
        </div>

        <!-- メインアプリ (ログイン後に表示) -->
        <div id="main-app" class="hidden">
            <nav class="main-nav">
                <div class="nav-left">
                    <h1 class="logo">Twst Goods Manager</h1>
                    <div id="user-info" class="user-display"></div>
                </div>
                <div class="nav-links">
                    <button id="nav-inventory" class="nav-btn active">在庫管理</button>
                    <button id="nav-trades" class="nav-btn">取引管理</button>
                    <button id="logout-btn" class="nav-btn cancel-btn" onclick="handleLogout()">ログアウト</button>
                </div>
            </nav>

            <main id="content-area">
                <!-- 在庫管理画面 -->
                <section id="inventory-section" class="content-section">
                    <header class="section-header">
                        <h2>在庫一覧</h2>
                        <div class="header-actions">
                            <input type="text" id="goods-search" class="search-input" placeholder="検索...">
                            <button id="add-goods-btn" class="primary-btn">+ グッズ追加</button>
                        </div>
                    </header>
                    <div id="goods-list" class="goods-compact-grid">
                        <!-- 動的に生成 -->
                    </div>
                </section>

                <!-- 取引管理画面 -->
                <section id="trades-section" class="content-section hidden">
                    <header class="section-header">
                        <h2>取引一覧</h2>
                        <div class="header-actions">
                            <input type="text" id="trade-search" class="search-input" placeholder="名前で検索...">
                            <button id="add-trade-btn" class="primary-btn">+ 取引追加</button>
                        </div>
                    </header>
                    <div class="trade-filters">
                        <select id="status-filter">
                            <option value="all">すべてのステータス</option>
                            <option value="お声掛け中">お声掛け中</option>
                            <option value="仮約束">仮約束</option>
                            <option value="成約">成約</option>
                        </select>
                    </div>
                    <div id="trades-list" class="trades-container">
                        <!-- 動的に生成 -->
                    </div>
                </section>
            </main>
        </div>

        <!-- モーダル (グッズ追加/編集) -->
        <div id="goods-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h3>グッズ情報</h3>
                <form id="goods-form">
                    <input type="hidden" id="goods-id-edit">
                    <div class="form-group">
                        <label>グッズ種類</label>
                        <input type="text" id="goods-type" placeholder="例：缶バッジ" required>
                    </div>
                    <div class="form-group">
                        <label>キャラクター</label>
                        <input type="text" id="goods-char" placeholder="例：リドル" required>
                    </div>
                    <div class="form-group">
                        <label>在庫数</label>
                        <input type="number" id="goods-count" value="0" min="0" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="cancel-btn">キャンセル</button>
                        <button type="submit" class="confirm-btn">保存する</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- モーダル (取引追加/編集) - 最大5種類対応 -->
        <div id="trade-modal" class="modal hidden">
            <div class="modal-content glass-panel large-modal">
                <h3>取引情報の管理</h3>
                <form id="trade-form">
                    <input type="hidden" id="trade-id">
                    <div class="form-row">
                        <div class="form-group">
                            <label>相手のX ID</label>
                            <input type="text" id="trade-name" placeholder="@username" required>
                        </div>
                        <div class="form-group">
                            <label>取引内容</label>
                            <select id="trade-type">
                                <option value="交換">交換</option>
                                <option value="譲渡">譲渡</option>
                                <option value="交換+譲渡">交換+譲渡</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ステータス</label>
                            <select id="trade-status">
                                <option value="お声掛け中">お声掛け中</option>
                                <option value="仮約束">仮約束</option>
                                <option value="成約">成約</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>発送予定日(自分)</label>
                            <input type="date" id="trade-est-ship-date">
                            <label class="inline-checkbox"><input type="checkbox" id="trade-is-sent"> 発送済</label>
                        </div>
                        <div class="form-group">
                            <label>受取予定日</label>
                            <input type="date" id="trade-est-receive-date">
                            <label class="inline-checkbox"><input type="checkbox" id="trade-is-received"> 受取済</label>
                        </div>
                    </div>

                    <div class="trade-items-flex">
                        <!-- 渡すもの (左側) -->
                        <div class="trade-items-column">
                            <label>渡すもの (最大5つ)</label>
                            <div id="give-items-list" class="multi-items-list">
                                <!-- JSで5行生成 -->
                            </div>
                        </div>
                        <!-- 受けるもの (右側) -->
                        <div class="trade-items-column">
                            <label>受けるもの (最大5つ)</label>
                            <div id="receive-items-list" class="multi-items-list">
                                <!-- JSで5行生成 -->
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>渡す金額</label>
                            <input type="number" id="trade-give-price" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>受ける金額</label>
                            <input type="number" id="trade-receive-price" value="0" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>フリーメモ</label>
                        <textarea id="trade-memo" rows="3" placeholder="発送方法や約束事など"></textarea>
                    </div>

                    <div class="form-group">
                        <label>画像 (郵送先・グッズなど)</label>
                        <div id="image-upload-area" class="upload-area">
                            <span id="upload-label">画像をタップして選択</span>
                            <input type="file" id="trade-address-img" accept="image/*" class="file-input">
                            <div id="image-preview" class="image-preview-container">
                                <!-- プレビュー画像 -->
                            </div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="cancel-btn">キャンセル</button>
                        <button type="submit" class="confirm-btn">保存する</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 画像拡大用オーバーレイ -->
        <div id="image-overlay" class="image-overlay hidden">
            <span class="close-overlay">&times;</span>
            <img src="" id="overlay-img" alt="Mailing Address">
        </div>
    </div>

    <!-- スクリプト (db.jsは統合のため削除) -->
    <script src="app.js"></script>
</body>
</html>
